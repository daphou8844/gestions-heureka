<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestions Heureka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arial',sans-serif;background:#0d0d0d;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{width:90px;height:90px;border-radius:22px;overflow:hidden;margin-bottom:20px}
.logo img{width:100%;height:100%;object-fit:contain}
h1{font-size:26px;font-weight:900;color:#D4AF37;letter-spacing:.3px;margin-bottom:6px}
p{font-size:14px;color:#888;margin-bottom:36px;text-align:center}
.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:500px}
.card{flex:1;min-width:200px;background:#1a1a1a;border:1px solid rgba(212,175,55,.2);border-radius:16px;padding:28px 20px;text-align:center;text-decoration:none;color:#fff;transition:all .22s;cursor:pointer}
.card:hover{border-color:#D4AF37;background:rgba(212,175,55,.05);transform:translateY(-2px)}
.card-ico{font-size:40px;margin-bottom:12px;display:block}
.card-title{font-size:16px;font-weight:800;color:#D4AF37;margin-bottom:6px}
.card-sub{font-size:12px;color:#888;line-height:1.5}
.footer{margin-top:40px;font-size:11px;color:#444;text-align:center}
</style>
</head>
<body>
  <div class="logo"><img src="logo.png" alt="Gestions Heureka"></div>
  <h1>Gestions Heureka</h1>
  <p>Gestion de chantier · Construction · Québec</p>
  <div class="cards">
    <a class="card" href="admin.html">
      <span class="card-ico">🏗</span>
      <div class="card-title">Admin</div>
      <div class="card-sub">Dashboard · Punchs · Planning · Paie · Équipe</div>
    </a>
    <a class="card" href="punch.html">
      <span class="card-ico">⏱</span>
      <div class="card-title">Punch</div>
      <div class="card-sub">Pointer IN/OUT · Photos chantier · Notes</div>
    </a>
  </div>
  <div class="footer">Gestions Heureka © 2025 · America/Toronto</div>
</body>
</html>
