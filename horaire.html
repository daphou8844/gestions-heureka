<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Horaires — Heuréka</title>
<style>
:root{
  --gold:#D4AF37;--gold2:#B8960C;
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --txt:#f5f5f5;--txt2:#888;
  --bdr:rgba(255,255,255,.08);--glow:rgba(212,175,55,.12);
  --red:#EF4444;--green:#22C55E;
  --rad:12px;--rad2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:96px}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bdr);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-brand{font-size:17px;font-weight:800;color:var(--gold);letter-spacing:.3px}
.topbar-brand span{display:block;font-size:11px;font-weight:400;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.topbar-sync{font-size:11px;color:var(--txt2);text-align:right}

/* ── CONTENT ── */
.content{padding:14px 16px}
.sec-lbl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}

/* ── SEL CONTROLS ── */
.sel-controls{display:flex;gap:8px;margin-bottom:12px}
.sel-btn{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad2);padding:8px 12px;color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;flex:1;text-align:center;font-family:inherit}
.sel-btn:active{opacity:.7}

/* ── PLAN CARD ── */
.plan-card{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);
  margin-bottom:10px;overflow:hidden;transition:border-color .2s,background .2s;
}
.plan-card.selected{border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.05)}
.plan-card.sent{opacity:.65}
.plan-card-top{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
.plan-card-info{flex:1;min-width:0}
.plan-chantier{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:4px}
.plan-addr{font-size:11px;color:var(--txt2);margin-bottom:3px}
.plan-emp{font-size:13px;color:var(--txt);margin-bottom:2px}
.plan-dates{font-size:12px;color:var(--gold);font-weight:600;margin-bottom:2px}
.plan-hours{font-size:12px;color:var(--txt2);margin-bottom:2px}
.plan-note{font-size:11px;color:var(--txt2);font-style:italic}
.plan-sent-badge{font-size:11px;font-weight:700;color:var(--green);padding:0 16px 10px;letter-spacing:.5px}
.plan-renvoyer{background:var(--bg4);border:1px solid var(--bdr);border-radius:var(--rad2);padding:8px 12px;color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.plan-check{width:24px;height:24px;flex-shrink:0;margin-top:2px;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
.plan-check input{position:absolute;opacity:0;width:0;height:0}
.plan-check-box{width:22px;height:22px;border:2px solid rgba(255,255,255,.2);border-radius:6px;background:var(--bg4);transition:all .15s;display:flex;align-items:center;justify-content:center}
.plan-check input:checked ~ .plan-check-box{background:var(--gold);border-color:var(--gold)}
.plan-check input:checked ~ .plan-check-box::after{content:'✓';font-size:13px;font-weight:900;color:#000}

/* ── BOTTOM BAR ── */
.bottombar{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 16px 16px;
  background:rgba(10,10,10,.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--bdr);
}
.btn-send{
  width:100%;padding:17px;
  background:linear-gradient(135deg,#D4AF37,#B8960C);
  color:#000;font-size:16px;font-weight:800;
  border:none;border-radius:var(--rad);cursor:pointer;
  font-family:inherit;letter-spacing:.3px;
  transition:opacity .15s,transform .1s;
}
.btn-send:active:not(:disabled){transform:scale(.99)}
.btn-send:disabled{opacity:.35;cursor:not-allowed}
.send-sub{font-size:11px;color:var(--txt2);text-align:center;margin-top:7px;min-height:16px}

/* ── STATES ── */
.empty{text-align:center;padding:52px 24px;color:var(--txt2)}
.empty-ico{font-size:44px;margin-bottom:14px}
.empty-txt{font-size:14px}
.loading-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:36px;color:var(--txt2);font-size:13px}

/* ── TOAST ── */
#toast{
  position:fixed;top:76px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--bdr);
  padding:12px 20px;border-radius:var(--rad);
  font-size:13px;font-weight:600;color:var(--txt);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  z-index:9998;opacity:0;transition:opacity .25s;
  white-space:nowrap;max-width:90vw;text-align:center;pointer-events:none;
}
#toast.show{opacity:1}

/* ── LOCK SCREEN ── */
#lock-screen{position:fixed;inset:0;z-index:99999;background:#0a0a0a;display:flex;align-items:center;justify-content:center}
#lock-screen.hidden{display:none!important}
.lock-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,rgba(212,175,55,.08) 0%,transparent 65%);pointer-events:none}
.lock-card{
  position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:22px;
  padding:44px 32px;background:#111;
  border:1px solid rgba(212,175,55,.2);border-radius:18px;
  box-shadow:0 24px 80px rgba(0,0,0,.7);width:340px;max-width:92vw;
}
.lock-ico{font-size:52px;margin-bottom:2px}
.lock-name{font-size:20px;font-weight:800;color:#fff;text-align:center;line-height:1.25}
.lock-name span{display:block;font-size:11px;font-weight:500;color:#666;letter-spacing:2px;text-transform:uppercase;margin-top:5px}
.lock-field{width:100%;display:flex;flex-direction:column;gap:10px}
.lock-inp{
  width:100%;padding:14px 16px;background:#1a1a1a;
  border:1.5px solid rgba(212,175,55,.18);border-radius:10px;
  color:#fff;font-size:22px;letter-spacing:8px;text-align:center;
  font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;
}
.lock-inp:focus{border-color:#D4AF37;box-shadow:0 0 0 3px rgba(212,175,55,.12)}
.lock-inp::placeholder{font-size:13px;letter-spacing:1px;color:#3a3a3a}
.lock-btn{
  width:100%;padding:14px;background:linear-gradient(135deg,#D4AF37,#B8960C);
  color:#000;font-size:15px;font-weight:800;
  border:none;border-radius:10px;cursor:pointer;
  font-family:inherit;letter-spacing:.5px;transition:opacity .18s;
}
.lock-btn:disabled{opacity:.4;cursor:not-allowed}
.lock-err{color:#EF4444;font-size:12.5px;text-align:center;min-height:16px;font-weight:500}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock-screen">
  <div class="lock-bg"></div>
  <div class="lock-card">
    <div class="lock-ico">📅</div>
    <div class="lock-name">Horaires Heuréka<span>Envoi d'horaires</span></div>
    <div class="lock-field">
      <input type="password" id="lock-inp" class="lock-inp" placeholder="••••" maxlength="20" autocomplete="off"
        onkeydown="if(event.key==='Enter')lockSubmit()">
      <button class="lock-btn" id="lock-btn" onclick="lockSubmit()">Entrer</button>
      <div class="lock-err" id="lock-err"></div>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">📅 Horaires<span>Heuréka Construction</span></div>
  <div class="topbar-sync" id="sync-lbl">—</div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="sec-lbl" id="plan-lbl">Chargement...</div>
  <div class="sel-controls" id="sel-controls" style="display:none">
    <button class="sel-btn" onclick="selectAll()">Tout sélectionner</button>
    <button class="sel-btn" onclick="deselectAll()">Désélectionner tout</button>
  </div>
  <div id="plan-list"><div class="loading-row">⏳ Chargement des horaires...</div></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <button class="btn-send" id="btn-send" onclick="sendHoraires()" disabled>📤 Envoyer les horaires</button>
  <div class="send-sub" id="send-sub"></div>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script>
// ── SESSION ──────────────────────────────────────────────
const SK='hk_hor_sess';
function validSession(){
  try{const s=JSON.parse(sessionStorage.getItem(SK)||'null');if(!s||!s.ts)return false;return(Date.now()-s.ts)<12*3600000;}catch(e){return false;}
}
function unlockApp(){document.getElementById('lock-screen').classList.add('hidden');}
window.lockSubmit=function(){
  const inp=document.getElementById('lock-inp'),
        err=document.getElementById('lock-err'),
        btn=document.getElementById('lock-btn'),
        code=inp.value.trim();
  if(!code){inp.focus();return;}
  btn.disabled=true;err.textContent='';
  const base=HEUREKA_CONFIG.APPS_SCRIPT_URL;
  fetch(base+'?action=getConfig&key=CODE_ACCES_HORAIRE',{redirect:'follow'})
    .then(r=>r.json())
    .then(res=>{
      if(res.status==='ok'&&res.value&&String(res.value).trim()){
        return String(res.value).trim();
      }
      return fetch(base+'?action=getConfig&key=CODE_ACCES',{redirect:'follow'})
        .then(r2=>r2.json())
        .then(r2=>r2.status==='ok'?String(r2.value||'').trim():'');
    })
    .then(expected=>{
      if(code===expected){
        sessionStorage.setItem(SK,JSON.stringify({ts:Date.now()}));
        unlockApp();
      }else{
        err.textContent='Code incorrect. Réessayez.';
        inp.value='';setTimeout(()=>inp.focus(),50);
      }
      btn.disabled=false;
    })
    .catch(()=>{err.textContent='Erreur de connexion.';btn.disabled=false;});
};

// ── UTILS ────────────────────────────────────────────────
let _toastTimer;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.borderColor=type==='err'?'rgba(239,68,68,.5)':'rgba(212,175,55,.4)';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

// ── DATA ─────────────────────────────────────────────────
let planItems=[], empMap={}, jobMap={};

async function loadData(){
  try{
    const [pr,er,jr]=await Promise.all([
      fetch(HEUREKA_CONFIG.APPS_SCRIPT_URL+'?action=getData&sheet=Planning',{redirect:'follow'}),
      fetch(HEUREKA_CONFIG.APPS_SCRIPT_URL+'?action=getEmployees',{redirect:'follow'}),
      fetch(HEUREKA_CONFIG.APPS_SCRIPT_URL+'?action=getJobs',{redirect:'follow'})
    ]);
    const pd=await pr.json(), ed=await er.json(), jd=await jr.json();
    if(ed.status==='ok'&&Array.isArray(ed.employees)){
      empMap={};
      ed.employees.forEach(e=>{empMap[e.id]=e;});
    }
    if(jd.status==='ok'&&Array.isArray(jd.jobs)){
      jobMap={};
      jd.jobs.forEach(j=>{jobMap[j.id]=j;});
    }
    if(pd.status==='ok'&&Array.isArray(pd.data)){
      planItems=pd.data.filter(r=>r.Employé_ID&&r.Chantier_ID);
    }
    document.getElementById('sync-lbl').textContent='✓ '+new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
    renderCards();
  }catch(e){
    document.getElementById('sync-lbl').textContent='⚠ Hors ligne';
  }
}

// ── GROUPS ───────────────────────────────────────────────
function buildGroups(items){
  const groups={};
  items.forEach(r=>{
    const key=r.Employé_ID+'|'+r.Chantier_ID;
    if(!groups[key]){
      groups[key]={key,empId:r.Employé_ID,chantierId:r.Chantier_ID,
        dates:[],rowIds:[],
        heureDebut:r.Heure_Début||'',heureFin:r.Heure_Fin||'',note:r.Note||'',
        sentCount:0,totalCount:0};
    }
    const g=groups[key];
    if(r.Date)g.dates.push(r.Date);
    if(r.ID_Planning)g.rowIds.push(r.ID_Planning);
    g.totalCount++;
    if(r.Horaire_Envoyé==='Oui')g.sentCount++;
  });
  Object.values(groups).forEach(g=>{
    g.dates.sort();
    g.allSent=g.sentCount===g.totalCount&&g.totalCount>0;
  });
  return Object.values(groups);
}

// ── STATE ────────────────────────────────────────────────
let selectedKeys=new Set();
let _smsGroups=null;

// ── RENDER ───────────────────────────────────────────────
function renderCards(){
  const groups=buildGroups(planItems);
  const el=document.getElementById('plan-list');
  if(!groups.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">Aucun horaire dans le Planning</div></div>`;
    document.getElementById('plan-lbl').textContent='Aucun horaire';
    document.getElementById('sel-controls').style.display='none';
    updateBtn();return;
  }
  const unsent=groups.filter(g=>!g.allSent);
  const sent=groups.filter(g=>g.allSent);
  document.getElementById('plan-lbl').textContent=`${groups.length} horaire${groups.length>1?'s':''} — ${unsent.length} à envoyer`;
  document.getElementById('sel-controls').style.display=unsent.length?'flex':'none';
  let html='';
  if(unsent.length)html+=unsent.map(g=>renderCard(g,false)).join('');
  if(sent.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px">Déjà envoyés</div>`;
    html+=sent.map(g=>renderCard(g,true)).join('');
  }
  el.innerHTML=html;
  updateBtn();
}

function fmtDateRange(dates){
  if(!dates.length)return'';
  const fmt=s=>{const p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];};
  if(dates.length===1)return'Le '+fmt(dates[0]);
  return'Du '+fmt(dates[0])+' au '+fmt(dates[dates.length-1]);
}

function renderCard(g,isSent){
  const emp=empMap[g.empId]||{};
  const job=jobMap[g.chantierId]||{};
  const empName=((emp.fname||'')+' '+(emp.lname||'')).trim()||g.empId;
  const jobName=job.name||g.chantierId;
  const jobAddr=job.address||'';
  const dateStr=fmtDateRange(g.dates);
  const checked=selectedKeys.has(g.key);
  const safeKey=g.key.replace(/\|/g,'_');
  return`<div class="plan-card${isSent?' sent':''}${checked?' selected':''}" id="pcard-${safeKey}">
    <div class="plan-card-top">
      ${!isSent?`<label class="plan-check"><input type="checkbox" ${checked?'checked':''} onchange="toggleSel('${g.key}',this.checked)"><span class="plan-check-box"></span></label>`:''}
      <div class="plan-card-info"${!isSent?` onclick="toggleSel('${g.key}',!selectedKeys.has('${g.key}'))"`:''}>
        <div class="plan-chantier">${jobName}</div>
        ${jobAddr?`<div class="plan-addr">📍 ${jobAddr}</div>`:''}
        <div class="plan-emp">👷 ${empName}</div>
        ${dateStr?`<div class="plan-dates">📅 ${dateStr}</div>`:''}
        ${g.heureDebut&&g.heureFin?`<div class="plan-hours">🕐 ${g.heureDebut} – ${g.heureFin}</div>`:''}
        ${g.note?`<div class="plan-note">📝 ${g.note}</div>`:''}
      </div>
      ${isSent?`<button class="plan-renvoyer" onclick="renvoyer('${g.key}')">Renvoyer</button>`:''}
    </div>
    ${isSent?`<div class="plan-sent-badge">✅ Envoyé</div>`:''}
  </div>`;
}

function toggleSel(key,checked){
  if(checked)selectedKeys.add(key);else selectedKeys.delete(key);
  const safeKey=key.replace(/\|/g,'_');
  const card=document.getElementById('pcard-'+safeKey);
  if(card){
    card.classList.toggle('selected',checked);
    const inp=card.querySelector('input[type=checkbox]');
    if(inp)inp.checked=checked;
  }
  updateBtn();
}

function selectAll(){
  buildGroups(planItems).filter(g=>!g.allSent).forEach(g=>selectedKeys.add(g.key));
  renderCards();
}
function deselectAll(){selectedKeys.clear();renderCards();}

function updateBtn(){
  const n=selectedKeys.size;
  document.getElementById('btn-send').disabled=n===0;
  document.getElementById('send-sub').textContent=n>0?`${n} horaire${n>1?'s':''} sélectionné${n>1?'s':''}`:'';
}

// ── SMS ──────────────────────────────────────────────────
function cleanPhone(p){return(p||'').replace(/\D/g,'');}

function buildSmsBody(g){
  const emp=empMap[g.empId]||{};
  const job=jobMap[g.chantierId]||{};
  const prenom=emp.fname||'';
  const jobName=job.name||g.chantierId;
  const jobAddr=job.address||'';
  const dateStr=fmtDateRange(g.dates);
  const lines=[`Bonjour ${prenom},`,``,`Voici votre horaire :`,``,`📍 Chantier : ${jobName}`];
  if(jobAddr)lines.push(jobAddr);
  if(dateStr)lines.push(`📅 ${dateStr}`);
  if(g.heureDebut&&g.heureFin)lines.push(`🕐 ${g.heureDebut} – ${g.heureFin}`);
  if(g.note)lines.push(`📝 ${g.note}`);
  lines.push(``,`Bonne journée !`,`— Heuréka Construction`,`450-346-1486`);
  return lines.join('\n');
}

function sendHoraires(){
  const groups=buildGroups(planItems).filter(g=>selectedKeys.has(g.key));
  if(!groups.length)return;
  showSmsScreen(groups);
}

function showSmsScreen(groups){
  _smsGroups=groups;
  const items=groups.map(g=>{
    const emp=empMap[g.empId]||{};
    const job=jobMap[g.chantierId]||{};
    const empName=((emp.fname||'')+' '+(emp.lname||'')).trim()||g.empId;
    const phone=cleanPhone(emp.phone||'');
    const body=encodeURIComponent(buildSmsBody(g));
    const smsLink=phone?`sms:+1${phone}?&body=${body}`:'';
    const ini=empName.trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
    return`<div style="background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 16px;display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0">${ini}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700">${empName}</div>
        <div style="font-size:11px;color:var(--txt2);margin-top:2px">${emp.phone||'Aucun numéro'}</div>
        <div style="font-size:11px;color:var(--txt2)">${job.name||g.chantierId}</div>
      </div>
      ${phone
        ?`<a href="${smsLink}" style="background:linear-gradient(135deg,#D4AF37,#B8960C);color:#000;font-size:13px;font-weight:800;padding:10px 14px;border-radius:var(--rad2);text-decoration:none;white-space:nowrap;flex-shrink:0">📱 SMS</a>`
        :`<span style="font-size:11px;color:var(--red);flex-shrink:0">Pas de tél.</span>`
      }
    </div>`;
  }).join('');

  const overlay=document.createElement('div');
  overlay.id='sms-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;flex-direction:column';
  overlay.innerHTML=`
    <div style="background:var(--bg2);border-bottom:1px solid var(--bdr);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:1">
      <button onclick="closeSmsScreen(false)" style="background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad2);padding:8px 14px;color:var(--txt);font-size:13px;font-weight:700;cursor:pointer">← Retour</button>
      <div style="flex:1;font-size:16px;font-weight:800;color:var(--gold)">📱 Envoyer par SMS</div>
    </div>
    <div style="padding:14px 16px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:80px">
      <div style="font-size:11px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Appuyez sur chaque bouton pour ouvrir votre messagerie</div>
      ${items}
    </div>
    <div style="position:fixed;bottom:0;left:0;right:0;padding:12px 16px 16px;background:rgba(10,10,10,.97);border-top:1px solid var(--bdr)">
      <button onclick="closeSmsScreen(true)" style="width:100%;padding:16px;background:var(--bg3);border:1px solid rgba(212,175,55,.3);border-radius:var(--rad);color:var(--gold);font-size:15px;font-weight:800;cursor:pointer">✅ Terminé — Marquer comme envoyé</button>
    </div>`;
  document.body.appendChild(overlay);
}

function closeSmsScreen(markDone){
  const el=document.getElementById('sms-overlay');
  if(el)el.remove();
  if(markDone&&_smsGroups&&_smsGroups.length){
    const rowIds=[].concat(..._smsGroups.map(g=>g.rowIds));
    markSent(rowIds,_smsGroups);
  }
  _smsGroups=null;
}

function markSent(rowIds,groups){
  if(!rowIds.length){toast('Aucune ligne à marquer','err');return;}
  const sentAt=new Date().toISOString();
  fetch(HEUREKA_CONFIG.APPS_SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({action:'markHoraireSent',ids:rowIds,sentAt}),
    redirect:'follow'
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status==='ok'){
      toast(`${groups.length} horaire${groups.length>1?'s':''} marqué${groups.length>1?'s':''} comme envoyé${groups.length>1?'s':''} ✓`);
      groups.forEach(g=>selectedKeys.delete(g.key));
      loadData();
    }else{
      toast('Erreur: '+(res.message||'inconnue'),'err');
    }
  })
  .catch(()=>toast('Erreur de connexion','err'));
}

function renvoyer(key){
  const groups=buildGroups(planItems);
  const g=groups.find(x=>x.key===key);
  if(g)showSmsScreen([g]);
}

// ── INIT ─────────────────────────────────────────────────
if(validSession())unlockApp();
loadData();
setInterval(loadData,HEUREKA_CONFIG.SYNC_INTERVAL_MS);
</script>
